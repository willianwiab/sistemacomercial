const FB_PROJECT = 'wencontasapagar';
const FB_API_KEY = 'AIzaSyC7hYN3__Q_4MNAu6VCTXbTdvVSW37IneI';
const FS_BASE = 'https://firestore.googleapis.com/v1/projects/' + FB_PROJECT + '/databases/(default)/documents';

function _toFV(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === 'boolean') return { booleanValue: v };
  if (typeof v === 'number') return { doubleValue: v };
  if (typeof v === 'string') return { stringValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(_toFV) } };
  if (typeof v === 'object') {
    const fields = {};
    Object.keys(v).forEach(k => fields[k] = _toFV(v[k]));
    return { mapValue: { fields } };
  }
  return { stringValue: String(v) };
}
function _fromFV(fv) {
  if (!fv) return null;
  if ('nullValue' in fv) return null;
  if ('booleanValue' in fv) return fv.booleanValue;
  if ('integerValue' in fv) return Number(fv.integerValue);
  if ('doubleValue' in fv) return fv.doubleValue;
  if ('stringValue' in fv) return fv.stringValue;
  if ('arrayValue' in fv) return (fv.arrayValue.values || []).map(_fromFV);
  if ('mapValue' in fv) {
    const o = {};
    Object.keys(fv.mapValue.fields || {}).forEach(k => o[k] = _fromFV(fv.mapValue.fields[k]));
    return o;
  }
  return null;
}
async function fbSalvarDoc(colecao, docId, dados) {
  const fields = {};
  Object.keys(dados).forEach(k => fields[k] = _toFV(dados[k]));
  const url = FS_BASE + '/' + colecao + '/' + docId + '?key=' + FB_API_KEY;
  const res = await fetch(url, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields })
  });
  if (!res.ok) { const t = await res.text(); throw new Error('Firebase: ' + t); }
  return res.json();
}
async function fbLerDoc(colecao, docId) {
  const url = FS_BASE + '/' + colecao + '/' + docId + '?key=' + FB_API_KEY;
  const res = await fetch(url);
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('Firebase erro: ' + res.statusText);
  const json = await res.json();
  if (!json.fields) return null;
  const obj = {};
  Object.keys(json.fields).forEach(k => obj[k] = _fromFV(json.fields[k]));
  return obj;
}
async function fbCarregarTudo() {
  try {
    const [docCli, docCRM, docHist] = await Promise.all([
      fbLerDoc('comercial_clientes', 'dados'),
      fbLerDoc('comercial_crm', 'dados'),
      fbLerDoc('comercial_historico', 'dados')
    ]);
    if (docCli && docCli.lista) clientes = docCli.lista;
    if (docCRM && docCRM.dados) crmData = docCRM.dados;
    if (docHist && docHist.lista) historicoPropostas = docHist.lista;
    if (typeof atualizarBadgeClientes === 'function') atualizarBadgeClientes();
    if (typeof atualizarBadge === 'function') atualizarBadge();
    console.log('✅ Firebase:', clientes.length, 'clientes,', historicoPropostas.length, 'propostas');
  } catch(e) { console.error('❌ Firebase:', e); }
}
function backupExportar() {
  const dados = { versao: 'wen-comercial-v1', exportadoEm: new Date().toISOString(), clientes, crmData, historicoPropostas };
  const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'backup-comercial-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  mostrarToast('Backup exportado!', '#4caf50');
}
function backupImportar(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const dados = JSON.parse(e.target.result);
      const dataStr = dados.exportadoEm ? new Date(dados.exportadoEm).toLocaleString('pt-BR') : 'desconhecida';
      if (!confirm('Restaurar backup de ' + dataStr + '?\nSubstitui todos os dados atuais!')) return;
      if (dados.clientes) clientes = dados.clientes;
      if (dados.crmData) crmData = dados.crmData;
      if (dados.historicoPropostas) historicoPropostas = dados.historicoPropostas;
      await Promise.all([
        fbSalvarDoc('comercial_clientes', 'dados', { lista: clientes }),
        fbSalvarDoc('comercial_crm', 'dados', { dados: crmData }),
        fbSalvarDoc('comercial_historico', 'dados', { lista: historicoPropostas })
      ]);
      atualizarBadgeClientes(); atualizarBadge();
      mostrarToast('Backup restaurado!', '#4caf50');
    } catch(err) { mostrarToast('Erro: ' + err.message, '#f44336'); }
    input.value = '';
  };
  reader.readAsText(file);
}
</script>

function mascaraCelular(el) {
  let v = el.value.replace(/\D/g,'').substring(0,11);
  if (!v.length) { el.value=''; return; }
  if (v.length<=2) v='('+v;
  else if (v.length<=7) v='('+v.slice(0,2)+') '+v.slice(2);
  else v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);
  el.value = v;
}
